# IAM Service Configuration for AWS Environment
# Todos los valores sensibles se inyectan via ECS desde AWS Secrets Manager
server.port=8080
spring.application.name=iam-service

# Database Configuration (PostgreSQL) - valores inyectados por ECS desde Secrets Manager
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# JWT Configuration - valor inyectado por ECS desde Secrets Manager
authorization.jwt.secret=${JWT_SECRET}
authorization.jwt.expiration.days=7

# Logging Configuration
logging.level.upc.edu.ecomovil.microservices.iam=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.root=INFO

# Actuator - ALB Health Check
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.enabled=true
management.health.db.enabled=true
management.health.defaults.enabled=true
management.health.diskspace.enabled=false
management.endpoint.health.status.http-mapping.DOWN=200
management.endpoint.health.status.http-mapping.OUT_OF_SERVICE=200
management.endpoint.health.status.http-mapping.UNKNOWN=200

# Security
server.error.include-message=always
server.error.include-binding-errors=always
