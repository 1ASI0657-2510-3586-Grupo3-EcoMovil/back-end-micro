# Reservations Service Configuration for AWS Environment
# Todos los valores sensibles se inyectan via ECS desde AWS Secrets Manager
server.port=8084
spring.application.name=reservations-service

# Database Configuration (MySQL) - valores inyectados por ECS desde Secrets Manager
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - valor inyectado por ECS desde Secrets Manager
jwt.secret=${JWT_SECRET}

# External Services URLs - valor inyectado por ECS (ALB URL)
external.users.service.url=${ALB_URL}
external.vehicles.service.url=${ALB_URL}

# Logging Configuration
logging.level.upc.edu.ecomovil.microservices.reservations=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.root=INFO

# Actuator - ALB Health Check
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.status.http-mapping.DOWN=200
management.endpoint.health.status.http-mapping.OUT_OF_SERVICE=200
management.endpoint.health.status.http-mapping.UNKNOWN=200
management.health.db.enabled=false
management.health.diskspace.enabled=false

# Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
